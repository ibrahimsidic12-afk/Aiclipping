version: '3.8'

# ============================================
# ClipAI - Development & Production Infrastructure
# ============================================
#
# LOCAL DEV (with MinIO for storage):
#   docker compose up -d
#
# PRODUCTION (with Cloudflare R2 for storage):
#   docker compose --profile production up -d
#   (MinIO is NOT started — uses R2 instead)
#
# Stop:  docker compose down
# Logs:  docker compose logs -f [service]
# ============================================

services:
  # ─────────────────────────────────────────
  # Redis - Job Queue (BullMQ)
  # Required in ALL environments
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clipai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MinIO - Local Dev S3 Storage
  # (Not needed in production — use Cloudflare R2)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: clipai-minio
    profiles: ["dev", "default"]
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO bucket initialization (dev only)
  minio-init:
    image: minio/mc:latest
    container_name: clipai-minio-init
    profiles: ["dev", "default"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/clip-app-videos;
      mc anonymous set download local/clip-app-videos;
      echo 'Bucket created and configured.';
      exit 0;
      "

  # ─────────────────────────────────────────
  # Worker - Video Processing Service
  # ─────────────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: clipai-worker
    profiles: ["production"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Regolo AI
      - REGOLO_API_KEY=${REGOLO_API_KEY}
      - REGOLO_BASE_URL=${REGOLO_BASE_URL:-https://api.regolo.ai/v1}
      # Storage (Cloudflare R2 in production)
      - S3_PROVIDER=${S3_PROVIDER:-r2}
      - S3_BUCKET=${S3_BUCKET:-aiclipping}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      # Redis
      - REDIS_URL=redis://redis:6379
      # Processing
      - CONCURRENT_WORKERS=${CONCURRENT_WORKERS:-3}
      - MAX_VIDEO_DURATION_SECONDS=${MAX_VIDEO_DURATION_SECONDS:-1800}
      - NODE_ENV=production
    restart: unless-stopped

  # ─────────────────────────────────────────
  # BullMQ Board - Queue Dashboard UI
  # ─────────────────────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: clipai-bull-board
    ports:
      - "3100:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
